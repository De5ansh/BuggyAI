behaviors:
  PlaytestAI:
    trainer_type: ppo

    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 3.0e-4
      beta: 0.01        # high entropy → more exploration
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

      curiosity:
        gamma: 0.99
        strength: 0.02   # exploration bonus
        learning_rate: 3.0e-4

    max_steps: 600000
    time_horizon: 128
    summary_freq: 10000